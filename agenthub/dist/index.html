<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentHub — AI 工具安装助手</title>
<style>
:root {
  --bg: #201d1d; --surface: #2a2626; --surface-raised: #302c2c; --surface-card: #2d2929;
  --fg: #fdfcfc; --fg-2: #c8c6c4; --muted: #9a9898; --meta: #6e6e73;
  --border: #464343; --border-soft: #302c2c;
  --accent: #ff9f0a; --accent-dim: rgba(255, 159, 10, 0.15); --accent-on: #201d1d;
  --success: #30d158; --success-dim: rgba(48, 209, 88, 0.15);
  --danger: #ff3b30; --danger-dim: rgba(255, 59, 48, 0.15);
  --info: #64d2ff; --warn: #ff9f0a;
  --font: "Berkeley Mono", "IBM Plex Mono", ui-monospace, monospace;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px;
  --fast: 100ms; --base: 200ms; --ease: cubic-bezier(0.2, 0, 0, 1);
  --sp1: 4px; --sp2: 8px; --sp3: 12px; --sp4: 16px; --sp5: 20px; --sp6: 24px; --sp8: 32px; --sp10: 40px; --sp12: 48px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: var(--font); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.titlebar { display: flex; align-items: center; gap: var(--sp3); padding: 12px var(--sp6); background: var(--surface); border-bottom: 1px solid var(--border-soft); -webkit-app-region: drag; user-select: none; flex-shrink: 0; }
.titlebar-dots { display: flex; gap: 6px; }
.dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: filter var(--fast) var(--ease); }
.dot:hover { filter: brightness(1.2); }
.dot-red { background: #ff5f57; } .dot-yellow { background: #febc2e; } .dot-green { background: #28c840; }
.titlebar-title { flex: 1; text-align: center; font-size: 13px; font-weight: 500; color: var(--muted); }
.stepbar { display: flex; align-items: center; justify-content: center; gap: 0; padding: var(--sp4) var(--sp8); background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.step-item { display: flex; align-items: center; gap: var(--sp2); }
.step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 1.5px solid var(--border); color: var(--muted); background: transparent; transition: all var(--base) var(--ease); flex-shrink: 0; }
.step-dot.active { background: var(--accent); border-color: var(--accent); color: var(--accent-on); }
.step-dot.done { background: var(--success); border-color: var(--success); color: #fff; }
.step-label { font-size: 12px; color: var(--muted); white-space: nowrap; transition: color var(--base) var(--ease); }
.step-label.active { color: var(--accent); font-weight: 600; }
.step-label.done { color: var(--success); }
.step-connector { width: 48px; height: 1.5px; background: var(--border); margin: 0 var(--sp3); flex-shrink: 0; transition: background var(--base) var(--ease); }
.step-connector.done { background: var(--success); }
.content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: var(--sp12) var(--sp6); }
.screen { display: none; width: 100%; max-width: 640px; flex-direction: column; gap: var(--sp8); animation: fadeIn var(--base) var(--ease); }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.screen-header { display: flex; flex-direction: column; gap: var(--sp2); }
.screen-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
.screen-title { font-size: 26px; font-weight: 700; line-height: 1.25; color: var(--fg); }
.screen-desc { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 480px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--sp2); padding: 10px var(--sp6); border-radius: var(--r-sm); font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all var(--fast) var(--ease); text-decoration: none; white-space: nowrap; }
.btn-primary { background: var(--accent); color: var(--accent-on); }
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.footer-nav { display: flex; justify-content: space-between; align-items: center; padding: var(--sp4) var(--sp8); border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.welcome-hero { text-align: center; padding: var(--sp12) 0 var(--sp8); display: flex; flex-direction: column; align-items: center; gap: var(--sp4); }
.logo-mark { width: 72px; height: 72px; background: var(--accent-dim); border: 1.5px solid var(--accent); border-radius: var(--r-lg); display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: var(--sp2); }
.welcome-title { font-size: 32px; font-weight: 700; line-height: 1.2; color: var(--fg); }
.welcome-subtitle { font-size: 15px; color: var(--muted); max-width: 400px; line-height: 1.7; }
.tool-list { display: flex; flex-direction: column; gap: var(--sp3); }
.tool-item { background: var(--surface-card); border: 1.5px solid var(--border); border-radius: var(--r-lg); padding: var(--sp5); cursor: pointer; transition: all var(--base) var(--ease); display: flex; align-items: center; gap: var(--sp4); }
.tool-item:hover { border-color: var(--accent); background: var(--surface-raised); transform: translateY(-2px); }
.tool-item.selected { border-color: var(--accent); background: var(--accent-dim); }
.tool-item.installed { border-color: var(--success); }
.tool-item.installed.selected { border-color: var(--warn); background: rgba(255, 159, 10, 0.1); }
.tool-radio { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all var(--fast) var(--ease); }
.tool-item.selected .tool-radio { background: var(--accent); border-color: var(--accent); }
.tool-item.installed .tool-radio { background: var(--success); border-color: var(--success); }
.tool-icon { width: 40px; height: 40px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; background: var(--surface-raised); border: 1px solid var(--border); flex-shrink: 0; }
.tool-info { flex: 1; }
.tool-name { font-size: 15px; font-weight: 700; color: var(--fg); display: flex; align-items: center; gap: var(--sp2); }
.tool-badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; }
.badge-blue { background: rgba(0,122,255,0.15); color: #007aff; }
.badge-green { background: var(--success-dim); color: var(--success); }
.tool-status { font-size: 11px; margin-top: 4px; }
.tool-status.installed { color: var(--success); }
.tool-status.not-installed { color: var(--muted); }

/* Environment Status */
.env-section { background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; }
.env-header { display: flex; align-items: center; gap: var(--sp3); padding: var(--sp3) var(--sp4); background: var(--surface-card); border-bottom: 1px solid var(--border); }
.env-title { font-size: 12px; font-weight: 600; color: var(--fg); }
.env-refresh { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 4px 8px; border-radius: var(--r-sm); }
.env-refresh:hover { background: var(--surface-raised); color: var(--fg); }
.env-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border); }
.env-item { display: flex; align-items: center; gap: var(--sp3); padding: var(--sp3) var(--sp4); background: var(--surface-raised); }
.env-icon { font-size: 16px; width: 24px; text-align: center; }
.env-info { flex: 1; min-width: 0; }
.env-name { font-size: 11px; color: var(--muted); }
.env-value { font-size: 12px; font-weight: 600; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.env-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.env-status-dot.ok { background: var(--success); }
.env-status-dot.fail { background: var(--danger); }
.env-status-dot.checking { background: var(--warn); animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.progress-section { display: flex; flex-direction: column; gap: var(--sp4); }
.progress-tool { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; }
.progress-tool-header { display: flex; align-items: center; gap: var(--sp3); padding: var(--sp4) var(--sp5); border-bottom: 1px solid var(--border-soft); }
.progress-tool-name { font-size: 13px; font-weight: 600; flex: 1; }
.progress-tool-status { font-size: 12px; }
.progress-bar-wrap { padding: var(--sp3) var(--sp5) var(--sp4); display: flex; flex-direction: column; gap: var(--sp2); }
.progress-bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s var(--ease); }
.progress-bar-fill.done { background: var(--success); }
.progress-step-label { font-size: 11px; color: var(--meta); }
.log-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: var(--sp4) var(--sp5); max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.log-line { font-size: 11px; line-height: 1.6; color: var(--muted); display: flex; gap: var(--sp3); }
.log-time { color: var(--meta); flex-shrink: 0; }
.log-ok { color: var(--success); } .log-warn { color: var(--warn); } .log-info { color: var(--info); }
.success-banner { display: none; flex-direction: column; align-items: center; text-align: center; gap: var(--sp4); padding: var(--sp10); background: var(--success-dim); border: 1px solid rgba(48,209,88,0.25); border-radius: var(--r-lg); }
.success-banner.show { display: flex; animation: fadeIn var(--base) var(--ease); }
.success-icon { font-size: 40px; } .success-title { font-size: 20px; font-weight: 700; color: var(--success); }
.success-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
.success-actions { display: flex; gap: var(--sp3); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <div class="titlebar-dots">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
    </div>
    <div class="titlebar-title">AgentHub — AI 工具安装助手</div>
  </div>

  <div class="stepbar">
    <div class="step-item"><div class="step-dot active" id="sdot-1">1</div><span class="step-label active" id="slabel-1">欢迎</span></div>
    <div class="step-connector" id="scon-1"></div>
    <div class="step-item"><div class="step-dot" id="sdot-2">2</div><span class="step-label" id="slabel-2">选择工具</span></div>
    <div class="step-connector" id="scon-2"></div>
    <div class="step-item"><div class="step-dot" id="sdot-3">3</div><span class="step-label" id="slabel-3">安装</span></div>
  </div>

  <div class="content">
    <!-- SCREEN 1: WELCOME -->
    <div class="screen active" id="screen-1">
      <div class="welcome-hero">
        <div class="logo-mark">🤖</div>
        <div class="welcome-title">欢迎使用 AgentHub</div>
        <div class="welcome-subtitle">五分钟内，帮你安装好 AI 编程助手。不需要任何编程基础，跟着向导一步步来。</div>
      </div>
    </div>

    <!-- SCREEN 2: TOOL PICKER -->
    <div class="screen" id="screen-2">
      <div class="screen-header">
        <div class="screen-eyebrow">选择工具</div>
        <div class="screen-title">选择一个要安装的工具</div>
        <div class="screen-desc">点击选择工具，如果已安装会显示版本号。点击已安装的工具会先卸载再重新安装。</div>
      </div>

      <!-- Environment Status -->
      <div class="env-section">
        <div class="env-header">
          <span>🔍</span>
          <span class="env-title">环境状态</span>
          <button class="env-refresh" onclick="refreshDetection()">🔄 刷新</button>
        </div>
        <div class="env-grid" id="env-grid">
          <div class="env-item"><div class="env-icon">⬡</div><div class="env-info"><div class="env-name">Node.js</div><div class="env-value" id="env-node-value">检测中...</div></div><div class="env-status-dot checking" id="env-node-dot"></div></div>
          <div class="env-item"><div class="env-icon">📦</div><div class="env-info"><div class="env-name">npm</div><div class="env-value" id="env-npm-value">检测中...</div></div><div class="env-status-dot checking" id="env-npm-dot"></div></div>
          <div class="env-item"><div class="env-icon">🐍</div><div class="env-info"><div class="env-name">Python</div><div class="env-value" id="env-python-value">检测中...</div></div><div class="env-status-dot checking" id="env-python-dot"></div></div>
          <div class="env-item"><div class="env-icon">🌿</div><div class="env-info"><div class="env-name">Git</div><div class="env-value" id="env-git-value">检测中...</div></div><div class="env-status-dot checking" id="env-git-dot"></div></div>
        </div>
      </div>

      <div class="tool-list" id="tool-list">
        <div style="text-align:center; padding:var(--sp8); color:var(--muted);">
          <div class="spinner" style="margin:0 auto var(--sp4);"></div>
          正在检测已安装的工具...
        </div>
      </div>
      <div id="selected-tool-info" style="display:none; padding:var(--sp4); background:var(--surface-raised); border-radius:var(--r-md); font-size:13px;">
        已选择：<strong id="selected-name"></strong>
        <span id="selected-action" style="color:var(--muted); margin-left:var(--sp2);"></span>
      </div>
    </div>

    <!-- SCREEN 3: INSTALL PROGRESS -->
    <div class="screen" id="screen-3">
      <div class="screen-header">
        <div class="screen-eyebrow">安装进度</div>
        <div class="screen-title" id="install-title">正在安装</div>
        <div class="screen-desc" id="install-desc">正在安装中，请稍候...</div>
      </div>
      <div class="progress-section" id="progress-section"></div>
      <div class="log-box" id="log-box"></div>
      <div class="success-banner" id="success-banner">
        <div class="success-icon">🎉</div>
        <div class="success-title">安装完成！</div>
        <div class="success-desc" id="success-desc">工具已成功安装。</div>
        <div class="success-actions">
          <button class="btn btn-primary" onclick="restartApp()">继续使用</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-nav">
    <button class="btn btn-ghost" id="btn-back" onclick="prevStep()" style="visibility:hidden;">← 上一步</button>
    <div style="font-size:12px; color:var(--meta);" id="footer-hint"></div>
    <button class="btn btn-primary" id="btn-next" onclick="nextStep()">开始 →</button>
  </div>
</div>

<script>
let currentStep = 1;
let selectedToolId = null;
let installedTools = {};
let envStatus = {};

const TOOLS = {
  'claude-code': {
    name: 'Claude Code', icon: '⚡', badge: '热门', badgeColor: 'blue',
    desc: 'Anthropic 官方 AI 编程助手',
    installCmd: 'install_claude_code_cmd',
    uninstallCmd: 'uninstall_claude_code_cmd'
  }
};

async function invokeTauri(cmd, args = {}) {
  try {
    return await window.__TAURI__.core.invoke(cmd, args);
  } catch (e) {
    console.error('Tauri invoke error:', e);
    throw e;
  }
}

async function detectEnvironment() {
  try {
    const result = await invokeTauri('check_env_cmd');
    envStatus = result;
    renderEnvironment();
  } catch (e) {
    console.error('Env detection error:', e);
    // Set all as not found
    envStatus = { node: {found:false}, npm: {found:false}, python: {found:false}, git: {found:false} };
    renderEnvironment();
  }
}

function renderEnvironment() {
  const items = [
    { key: 'node', label: 'Node.js' },
    { key: 'npm', label: 'npm' },
    { key: 'python', label: 'Python' },
    { key: 'git', label: 'Git' },
  ];
  
  for (const item of items) {
    const status = envStatus[item.key] || { found: false, version: null };
    const valueEl = document.getElementById('env-' + item.key + '-value');
    const dotEl = document.getElementById('env-' + item.key + '-dot');
    
    if (status.found && status.version) {
      valueEl.textContent = status.version;
      valueEl.style.color = 'var(--success)';
      dotEl.className = 'env-status-dot ok';
    } else {
      valueEl.textContent = '未安装';
      valueEl.style.color = 'var(--danger)';
      dotEl.className = 'env-status-dot fail';
    }
  }
}

function refreshDetection() {
  // Reset UI
  for (const key of ['node', 'npm', 'python', 'git']) {
    const valueEl = document.getElementById('env-' + key + '-value');
    const dotEl = document.getElementById('env-' + key + '-dot');
    valueEl.textContent = '检测中...';
    valueEl.style.color = 'var(--muted)';
    dotEl.className = 'env-status-dot checking';
  }
  detectEnvironment();
  detectInstalledTools();
}

async function detectInstalledTools() {
  try {
    const result = await invokeTauri('check_claude_code_cmd');
    installedTools['claude-code'] = result;
  } catch (e) {
    installedTools['claude-code'] = { installed: false };
  }
  renderToolList();
}

function renderToolList() {
  const container = document.getElementById('tool-list');
  let html = '';

  for (const [id, tool] of Object.entries(TOOLS)) {
    const status = installedTools[id] || { installed: false };
    const isInstalled = status.installed;
    const isSelected = selectedToolId === id;

    let statusText = '未安装';
    let statusClass = 'not-installed';
    if (isInstalled) {
      statusText = '已安装 ' + (status.version || '');
      statusClass = 'installed';
    }

    html += '<div class="tool-item ' + (isSelected ? 'selected' : '') + ' ' + (isInstalled ? 'installed' : '') + '" onclick="selectTool(\'' + id + '\')">';
    html += '<div class="tool-radio">' + (isSelected ? '✓' : '') + '</div>';
    html += '<div class="tool-icon">' + tool.icon + '</div>';
    html += '<div class="tool-info"><div class="tool-name">' + tool.name + '<span class="tool-badge badge-' + tool.badgeColor + '">' + tool.badge + '</span></div>';
    html += '<div class="tool-status ' + statusClass + '">' + statusText + '</div></div></div>';
  }

  container.innerHTML = html;

  const infoDiv = document.getElementById('selected-tool-info');
  if (selectedToolId) {
    const tool = TOOLS[selectedToolId];
    const status = installedTools[selectedToolId];
    document.getElementById('selected-name').textContent = tool.name;
    document.getElementById('selected-action').textContent = status?.installed ? '(将先卸载再重新安装)' : '';
    infoDiv.style.display = 'block';
  } else {
    infoDiv.style.display = 'none';
  }
}

function selectTool(toolId) {
  selectedToolId = toolId;
  renderToolList();
  updateNextBtn();
}

function updateUI() {
  for (let i = 1; i <= 3; i++) {
    document.getElementById('screen-' + i).classList.toggle('active', i === currentStep);
  }
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById('sdot-' + i);
    const label = document.getElementById('slabel-' + i);
    dot.classList.remove('active', 'done');
    label.classList.remove('active', 'done');
    if (i < currentStep) { dot.classList.add('done'); label.classList.add('done'); dot.textContent = '✓'; }
    else if (i === currentStep) { dot.classList.add('active'); label.classList.add('active'); dot.textContent = i; }
    else { dot.textContent = i; }
  }
  for (let i = 1; i <= 2; i++) {
    const con = document.getElementById('scon-' + i);
    if (con) con.classList.toggle('done', i < currentStep);
  }
  document.getElementById('btn-back').style.visibility = currentStep > 1 ? 'visible' : 'hidden';
  updateNextBtn();
}

function updateNextBtn() {
  const btn = document.getElementById('btn-next');
  const hint = document.getElementById('footer-hint');
  if (currentStep === 1) {
    btn.textContent = '开始 →';
    btn.disabled = false;
    hint.textContent = '';
  } else if (currentStep === 2) {
    if (selectedToolId) {
      const status = installedTools[selectedToolId];
      btn.textContent = status?.installed ? '重新安装 →' : '安装 →';
    } else {
      btn.textContent = '请选择工具';
    }
    btn.disabled = !selectedToolId;
    btn.style.opacity = selectedToolId ? '1' : '0.5';
    hint.textContent = '';
  } else if (currentStep === 3) {
    btn.textContent = '完成';
    btn.disabled = true;
    btn.style.opacity = '0.5';
    hint.textContent = '';
  }
}

function nextStep() {
  if (currentStep === 2 && !selectedToolId) return;
  currentStep++;
  updateUI();
  if (currentStep === 3) startInstall();
}

function prevStep() {
  if (currentStep > 1) { currentStep--; updateUI(); }
}

function buildInstallUI() {
  const tool = TOOLS[selectedToolId];
  const status = installedTools[selectedToolId];
  const isReinstall = status?.installed;

  document.getElementById('install-title').textContent = isReinstall ? '重新安装 ' + tool.name : '安装 ' + tool.name;
  document.getElementById('install-desc').textContent = isReinstall ? '正在卸载旧版本...' : '正在安装...';

  const section = document.getElementById('progress-section');
  section.innerHTML = '<div class="progress-tool" id="progress-item"><div class="progress-tool-header"><span style="font-size:20px;">' + tool.icon + '</span><span class="progress-tool-name">' + tool.name + '</span><span class="progress-tool-status" id="progress-status" style="color:var(--warn);">' + (isReinstall ? '正在卸载...' : '安装中...') + '</span></div><div class="progress-bar-wrap"><div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div><div class="progress-step-label" id="progress-step">' + (isReinstall ? '卸载中...' : '准备安装...') + '</div></div></div>';
}

function addLog(text, type) {
  type = type || '';
  const box = document.getElementById('log-box');
  const now = new Date();
  const ts = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = '<span class="log-time">' + ts + '</span><span class="log-' + type + '">' + text + '</span>';
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function setProgress(percent, step) {
  const bar = document.getElementById('progress-bar');
  const stepEl = document.getElementById('progress-step');
  if (bar) bar.style.width = percent + '%';
  if (stepEl) stepEl.textContent = step;
}

function setInstallStatus(text, color) {
  const status = document.getElementById('progress-status');
  if (status) { status.textContent = text; status.style.color = color; }
}

async function startInstall() {
  const tool = TOOLS[selectedToolId];
  const status = installedTools[selectedToolId];
  const isReinstall = status?.installed;

  buildInstallUI();
  document.getElementById('log-box').innerHTML = '';

  try {
    if (isReinstall) {
      addLog('[' + tool.name + '] 检测到已安装，开始卸载...', 'info');
      setProgress(10, '卸载中...');
      await invokeTauri('uninstall_claude_code_cmd');
      addLog('[' + tool.name + '] 卸载完成', 'ok');
      setProgress(30, '卸载完成');
    }

    addLog('[' + tool.name + '] 开始安装...', 'info');
    setProgress(40, '正在安装...');
    setInstallStatus('安装中...', 'var(--warn)');

    const result = await invokeTauri('install_claude_code_cmd');
    addLog('[' + tool.name + '] ' + (result || '安装完成'), 'ok');
    setProgress(100, '安装完成');
    setInstallStatus('✓ 安装成功', 'var(--success)');

    installedTools[selectedToolId] = { installed: true, version: 'latest' };

    document.getElementById('success-desc').textContent = tool.name + ' 已成功安装' + (isReinstall ? '（重新安装）' : '') + '。';
    document.getElementById('success-banner').classList.add('show');

    const btn = document.getElementById('btn-next');
    btn.textContent = '完成 ✓';
    btn.disabled = false;
    btn.style.opacity = '1';
    addLog(tool.name + ' 安装完成 🎉', 'ok');

  } catch (err) {
    addLog('[' + tool.name + '] 安装失败: ' + err, 'warn');
    setInstallStatus('✗ 安装失败', 'var(--danger)');
    setProgress(0, '安装失败');
    document.getElementById('success-desc').textContent = tool.name + ' 安装失败，请重试。';
    document.getElementById('success-banner').classList.add('show');
  }
}

function restartApp() {
  currentStep = 1;
  selectedToolId = null;
  document.getElementById('success-banner').classList.remove('show');
  document.getElementById('log-box').innerHTML = '';
  document.getElementById('progress-section').innerHTML = '';
  updateUI();
  initDetection();
}

async function initDetection() {
  await detectEnvironment();
  await detectInstalledTools();
  updateNextBtn();
}

// Watch for screen 2 becoming active
const observer = new MutationObserver((mutations) => {
  for (const m of mutations) {
    if (m.target.id === 'screen-2' && m.target.classList.contains('active')) {
      initDetection();
    }
  }
});
observer.observe(document.getElementById('screen-2'), { attributes: true, attributeFilter: ['class'] });

updateUI();
</script>
</body>
</html>
